services:

  # ── Application ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: go-skeleton-app
    restart: unless-stopped
    ports:
      - "8020:8020"
    environment:
      APP_PORT: "8020"
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: go_skeleton
      DB_USERNAME: root
      DB_PASSWORD: ""
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: bananinha123
      JWT_SECRET: change-me-in-production
      JWT_EXPIRE_HOUR: "24"
      OTEL_ENABLED: "false"
      OTEL_SERVICE_NAME: go-skeleton
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skeleton

  # ── Queue Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: go-skeleton-worker
    restart: unless-stopped
    command: ["/app/worker"]
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: bananinha123
    depends_on:
      - redis
    networks:
      - skeleton

  # ── Scheduler ───────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: go-skeleton-scheduler
    restart: unless-stopped
    command: ["/app/scheduler"]
    environment:
      DB_HOST: db
      DB_DATABASE: go_skeleton
      DB_USERNAME: root
      DB_PASSWORD: ""
      REDIS_HOST: redis
      REDIS_PASSWORD: bananinha123
    depends_on:
      - db
      - redis
    networks:
      - skeleton

  # ── MySQL ───────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: go-skeleton-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: go_skeleton
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - skeleton

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: go-skeleton-redis
    restart: unless-stopped
    command: redis-server --requirepass bananinha123
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "bananinha123", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - skeleton

  # ── Jaeger / OpenTelemetry ──────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: go-skeleton-jaeger
    ports:
      - "16686:16686"   # UI
      - "14268:14268"   # HTTP collector
    networks:
      - skeleton

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    container_name: go-skeleton-otel
    volumes:
      - ./docker/otel-collector.yml:/etc/otel/config.yaml
    command: ["--config=/etc/otel/config.yaml"]
    depends_on:
      - jaeger
    networks:
      - skeleton

volumes:
  db_data:

networks:
  skeleton:
    driver: bridge
